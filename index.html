<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haushaltsauktion — Alles muss raus!</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&family=El+Messiri:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0e1310;          /* خلفية داكنة بمسحة زمردية */
      --bg2:#121a15;
      --surface:#161d18;     /* كروت */
      --surface2:#1b241e;
      --line:#2a342c;
      --ink:#f1ece0;         /* نص كريمي */
      --muted:#9aa49a;
      --gold:#c9a96a;        /* ذهبي فاخر */
      --gold-dk:#a98c4f;
      --emerald:#2f7d5d;
      --wa:#25d366;
      --radius:18px;
      --maxw:1200px;
      --shadow:0 18px 50px rgba(0,0,0,.45);
    }
    *{ box-sizing:border-box; margin:0; padding:0; }
    html{ scroll-behavior:smooth; }
    body{
      font-family:'Inter',system-ui,"Segoe UI",sans-serif;
      background:var(--bg); color:var(--ink); line-height:1.7;
      -webkit-font-smoothing:antialiased;
      overflow-x:hidden;
    }
    body[dir="rtl"]{ font-family:'El Messiri',system-ui,Tahoma,sans-serif; }
    img{ display:block; max-width:100%; }
    a{ color:inherit; text-decoration:none; }
    h1,h2,h3{ font-family:'Playfair Display',Georgia,serif; font-weight:800; line-height:1.15; }
    body[dir="rtl"] h1, body[dir="rtl"] h2, body[dir="rtl"] h3{ font-family:'El Messiri',serif; }

    .gold{ color:var(--gold); }
    .eyebrow{ letter-spacing:.32em; text-transform:uppercase; font-size:.72rem; font-weight:600;
      color:var(--gold); font-family:'Inter',sans-serif; }
    body[dir="rtl"] .eyebrow{ letter-spacing:.12em; font-family:'El Messiri',sans-serif; }

    /* تبديل اللغة */
    .lang-toggle{ position:fixed; top:16px; inset-inline-end:16px; z-index:80; display:flex; gap:3px;
      background:rgba(20,26,21,.82); border:1px solid var(--line); border-radius:999px; padding:4px;
      backdrop-filter:blur(10px); box-shadow:var(--shadow); }
    .lang-toggle button{ border:none; background:none; cursor:pointer; font:inherit; font-weight:700;
      padding:6px 15px; border-radius:999px; color:var(--muted); font-size:.85rem; transition:.2s; }
    .lang-toggle button.active{ background:var(--gold); color:#1a140a; }

    /* ===================== HERO ===================== */
    .hero{ position:relative; min-height:92vh; display:flex; align-items:center; justify-content:center;
      text-align:center; padding:90px 20px 70px; overflow:hidden; }
    .hero .bg{ position:absolute; inset:0; background-size:cover; background-position:center;
      transform:scale(1.05); filter:saturate(1.05); }
    .hero .bg::after{ content:""; position:absolute; inset:0;
      background:linear-gradient(180deg, rgba(10,14,11,.72) 0%, rgba(10,14,11,.6) 40%, rgba(10,14,11,.92) 100%); }
    .hero .inner{ position:relative; z-index:2; max-width:780px; }
    .hero .badge{ display:inline-block; border:1px solid var(--gold); color:var(--gold);
      padding:7px 18px; border-radius:999px; font-size:.82rem; font-weight:600; margin-bottom:22px;
      font-family:'Inter',sans-serif; letter-spacing:.06em; }
    body[dir="rtl"] .hero .badge{ font-family:'El Messiri',sans-serif; }
    .hero h1{ font-size:clamp(2.6rem,8vw,5rem); margin-bottom:18px; text-shadow:0 4px 30px rgba(0,0,0,.5); }
    .hero h1 .line2{ color:var(--gold); }
    .hero p.tag{ font-size:clamp(1.02rem,2.4vw,1.28rem); color:#e7e1d4; max-width:600px; margin:0 auto 14px; }

    .selling-points{ display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin:24px auto 32px; max-width:640px; }
    .selling-points span{ background:rgba(201,169,106,.1); border:1px solid rgba(201,169,106,.3);
      padding:8px 16px; border-radius:999px; font-size:.86rem; color:#ecdfc4; }

    .info-strip{ display:flex; flex-wrap:wrap; gap:0; justify-content:center; margin:0 auto 34px;
      border:1px solid var(--line); border-radius:16px; overflow:hidden; background:rgba(20,26,21,.5);
      backdrop-filter:blur(8px); max-width:640px; }
    .info-strip .cell{ padding:14px 26px; flex:1 1 auto; text-align:center; }
    .info-strip .cell + .cell{ border-inline-start:1px solid var(--line); }
    .info-strip .label{ font-size:.74rem; color:var(--muted); letter-spacing:.04em; }
    .info-strip .value{ font-size:1.05rem; font-weight:700; margin-top:3px; color:var(--ink); }

    .cta-row{ display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
    .btn{ display:inline-flex; align-items:center; gap:9px; font-weight:700; padding:15px 30px;
      border-radius:999px; font-size:1rem; transition:transform .18s ease, box-shadow .18s ease; cursor:pointer; }
    .btn:hover{ transform:translateY(-3px); }
    .btn-gold{ background:linear-gradient(135deg,var(--gold),var(--gold-dk)); color:#1a140a; box-shadow:0 10px 30px rgba(201,169,106,.3); }
    .btn-wa{ background:var(--wa); color:#fff; box-shadow:0 10px 30px rgba(37,211,102,.28); }
    .btn-ghost{ border:1px solid var(--line); color:var(--ink); background:rgba(255,255,255,.03); }

    /* ===================== HOW IT WORKS ===================== */
    .how{ max-width:var(--maxw); margin:0 auto; padding:80px 20px 30px; }
    .how .head{ text-align:center; margin-bottom:48px; }
    .how .head h2{ font-size:clamp(1.8rem,4vw,2.6rem); margin-top:8px; }
    .steps{ display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:22px; }
    .step{ background:linear-gradient(160deg,var(--surface),var(--bg2)); border:1px solid var(--line);
      border-radius:var(--radius); padding:30px 26px; position:relative; overflow:hidden; }
    .step .num{ font-family:'Playfair Display',serif; font-size:3.4rem; font-weight:900; color:rgba(201,169,106,.16);
      position:absolute; top:6px; inset-inline-end:18px; line-height:1; }
    .step h3{ font-size:1.2rem; margin-bottom:8px; margin-top:8px; }
    .step p{ color:var(--muted); font-size:.92rem; }

    /* ===================== GALLERY ===================== */
    .gallery-wrap{ max-width:var(--maxw); margin:0 auto; padding:60px 20px 40px; }
    .gallery-wrap .head{ text-align:center; margin-bottom:34px; }
    .gallery-wrap .head h2{ font-size:clamp(1.8rem,4vw,2.6rem); margin-top:8px; }
    .gallery-wrap .head p{ color:var(--muted); margin-top:8px; }

    .controls{ display:flex; flex-wrap:wrap; gap:14px; align-items:center; justify-content:space-between; margin-bottom:26px; }
    .search-box{ flex:1 1 260px; position:relative; }
    .search-box input{ width:100%; padding:13px 20px; border:1px solid var(--line); border-radius:999px;
      font-family:inherit; font-size:.98rem; background:var(--surface); color:var(--ink); }
    .search-box input::placeholder{ color:var(--muted); }
    .search-box input:focus{ outline:none; border-color:var(--gold); }
    .chips{ display:flex; flex-wrap:wrap; gap:8px; }
    .chip{ padding:9px 18px; border:1px solid var(--line); background:var(--surface); border-radius:999px;
      cursor:pointer; font-family:inherit; font-size:.88rem; font-weight:600; color:var(--muted); transition:.18s; }
    .chip:hover{ color:var(--gold); border-color:var(--gold-dk); }
    .chip.active{ background:var(--gold); border-color:var(--gold); color:#1a140a; }

    .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:26px; }
    .card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;
      display:flex; flex-direction:column; transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease; }
    .card:hover{ transform:translateY(-6px); box-shadow:var(--shadow); border-color:var(--gold-dk); }
    .card .thumb{ aspect-ratio:4/3; position:relative; overflow:hidden; cursor:pointer; background:var(--surface2); }
    .card .thumb img{ width:100%; height:100%; object-fit:cover; transition:transform .5s ease; }
    .card:hover .thumb img{ transform:scale(1.06); }
    .card .cat-tag{ position:absolute; top:12px; inset-inline-start:12px; background:rgba(14,19,16,.72);
      border:1px solid rgba(201,169,106,.4); color:var(--gold); font-size:.7rem; font-weight:700;
      padding:5px 12px; border-radius:999px; backdrop-filter:blur(6px); letter-spacing:.04em; }
    .card .zoom-hint{ position:absolute; bottom:12px; inset-inline-end:12px; background:rgba(14,19,16,.7);
      color:#fff; font-size:.7rem; padding:4px 10px; border-radius:8px; opacity:0; transition:.2s; }
    .card:hover .zoom-hint{ opacity:1; }
    .card .body{ padding:20px; display:flex; flex-direction:column; gap:10px; flex:1; }
    .card h3{ font-size:1.3rem; }
    .card .desc{ font-size:.9rem; color:var(--muted); flex:1; }
    .card .foot{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:4px;
      padding-top:14px; border-top:1px solid var(--line); }
    .card .condition{ font-size:.76rem; color:var(--gold); display:inline-flex; align-items:center; gap:5px; }
    .card .bid{ background:rgba(37,211,102,.12); border:1px solid rgba(37,211,102,.45); color:#7be3a3;
      font-family:inherit; font-size:.82rem; font-weight:700; padding:8px 16px; border-radius:999px; transition:.18s; white-space:nowrap; }
    .card .bid:hover{ background:var(--wa); color:#fff; }
    .empty{ grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--muted); }

    /* قسم القطع الإضافية (صور قريباً) */
    .more{ max-width:var(--maxw); margin:10px auto 0; padding:30px 20px 10px; }
    .more .box{ background:linear-gradient(160deg,var(--surface),var(--bg2)); border:1px dashed var(--gold-dk);
      border-radius:var(--radius); padding:30px; text-align:center; }
    .more h3{ font-size:1.4rem; margin-bottom:6px; }
    .more p{ color:var(--muted); margin-bottom:18px; font-size:.92rem; }
    .more .pills{ display:flex; flex-wrap:wrap; gap:9px; justify-content:center; }
    .more .pill{ background:rgba(201,169,106,.08); border:1px solid rgba(201,169,106,.28); color:#e7d9bb;
      padding:7px 15px; border-radius:999px; font-size:.84rem; }

    /* ===================== LIGHTBOX ===================== */
    .lightbox{ position:fixed; inset:0; background:rgba(8,11,9,.94); display:none; place-items:center; z-index:120; padding:24px; }
    .lightbox.open{ display:grid; }
    .lightbox img{ max-width:92vw; max-height:80vh; border-radius:14px; box-shadow:0 30px 80px rgba(0,0,0,.6); }
    .lightbox .lb-caption{ color:var(--gold); text-align:center; margin-top:18px; font-weight:700;
      font-family:'Playfair Display',serif; font-size:1.2rem; }
    body[dir="rtl"] .lightbox .lb-caption{ font-family:'El Messiri',serif; }
    .lightbox .lb-close{ position:absolute; top:20px; inset-inline-end:24px; color:#fff; font-size:2.4rem;
      cursor:pointer; line-height:1; background:none; border:none; }

    /* ===================== FOOTER / CTA ===================== */
    .final-cta{ max-width:var(--maxw); margin:60px auto 0; padding:0 20px; }
    .final-cta .box{ background:linear-gradient(135deg,var(--emerald),#1c4a38); border-radius:24px;
      padding:54px 30px; text-align:center; position:relative; overflow:hidden; }
    .final-cta h2{ color:#fff; font-size:clamp(1.6rem,4vw,2.4rem); margin-bottom:12px; }
    .final-cta p{ color:rgba(255,255,255,.85); max-width:520px; margin:0 auto 26px; }
    footer{ text-align:center; padding:46px 20px 60px; color:var(--muted); }
    footer .name{ color:var(--ink); font-weight:700; }
    footer .note{ margin-top:10px; font-size:.8rem; opacity:.65; }

    /* ظهور تدريجي عند التمرير */
    .reveal{ opacity:0; transform:translateY(26px); transition:opacity .7s ease, transform .7s ease; }
    .reveal.in{ opacity:1; transform:none; }

    @media (max-width:560px){
      .hero{ min-height:88vh; padding:80px 16px 60px; }
      .grid{ grid-template-columns:1fr; gap:18px; }
      .info-strip .cell{ padding:12px 14px; }
      .card .body{ padding:16px; }
    }
  </style>
</head>

    { cat:"bedroom", cond:"good", img:"images/bedroom-4.jpg",

      name:{de:"Messing-Garderobenstange", en:"Brass clothes rail", ar:"مشجب حائط نحاسي"},

  /* القطع الإضافية اللي بدها صور — Fotos folgen */
  const MORE_ITEMS = [
    {de:"Standherd mit Ceranfeld", en:"Cooker with ceramic hob", ar:"فرن مع سطح سيراميك"},
    {de:"Küchen-Sideboard + Hängeschrank", en:"Kitchen sideboard + wall cabinet", ar:"وحدة مطبخ + خزانة علوية"},

    {de:"Stehlampe (gold)", en:"Gold floor lamp", ar:"إباجورة أرضية ذهبية"},
    {de:"TV-Lowboard (weiß)", en:"White TV lowboard", ar:"طاولة تلفزيون بيضاء"},
    {de:"Wandbilder-Set (gerahmt)", en:"Framed wall-art set", ar:"مجموعة لوحات جدارية"},
    {de:"Großer Vintage-Teppich", en:"Large vintage rug", ar:"سجادة كبيرة فينتاج"},

    {de:"Kunstpflanze (Olivenbaum)", en:"Artificial olive tree", ar:"نبتة زيتون صناعية"},
    {de:"Runder Wandspiegel (gold)", en:"Round gold wall mirror", ar:"مرآة جدارية دائرية"},
    {de:"Nachttisch", en:"Nightstand", ar:"كومودينو"},
    {de:"Vintage-Deckenleuchte", en:"Vintage ceiling light", ar:"ثريا سقف فينتاج"},

  ];

  /* ================================================================
     ④ الكود
     ================================================================ */
  let LANG = "de", activeCat = "all";
  const $ = id => document.getElementById(id);

  function applyStaticText(){
    const t = T[LANG];
    document.body.setAttribute("dir", LANG==="ar"?"rtl":"ltr");
    document.documentElement.setAttribute("lang", LANG);
    $("hero-bg").style.backgroundImage = `url('${CONFIG.heroImage}')`;
    $("hero-badge").textContent = t.badge;
    $("hero-title-1").textContent = t.title1;
    $("hero-title-2").textContent = t.title2;
    $("hero-tag").textContent = t.tag;
    $("selling-points").innerHTML = t.points.map(p=>`<span>${p}</span>`).join("");
    $("lbl-date").textContent = t.lblDate; $("info-date").textContent = CONFIG.date[LANG];
    $("lbl-time").textContent = t.lblTime; $("info-time").textContent = CONFIG.time[LANG];
    $("lbl-place").textContent = t.lblPlace; $("info-place").textContent = CONFIG.place[LANG];
    $("hero-cta").textContent = t.seeItems;
    setGroup($("hero-group"), t.joinGroup);
    $("how-eyebrow").textContent = t.howEyebrow; $("how-title").textContent = t.howTitle;
    $("steps").innerHTML = t.steps.map((s,i)=>
      `<div class="step reveal"><span class="num">${i+1}</span><h3>${s.h}</h3><p>${s.p}</p></div>`).join("");
    $("gal-eyebrow").textContent = t.galEyebrow; $("items-title").textContent = t.itemsTitle;
    $("search").placeholder = t.searchPh;
    $("more-title").textContent = t.moreTitle; $("more-sub").textContent = t.moreSub;
    $("more-pills").innerHTML = MORE_ITEMS.map(m=>`<span class="pill">${m[LANG]}</span>`).join("");
    $("cta-title").textContent = t.ctaTitle; $("cta-text").textContent = t.ctaText;
    setGroup($("cta-btn"), t.ctaBtn);
    $("foot-name").textContent = CONFIG.sellerName[LANG];
    $("foot-addr").textContent = CONFIG.fullAddress[LANG];
    $("foot-note").textContent = t.footNote;

    // التصنيفات
    activeCat = "all";
    const chips = [["all", t.all], ...Object.keys(CATS).map(k=>[k, CATS[k][LANG]])];
    $("chips").innerHTML = chips.map(([k,l],i)=>`<button class="chip${i===0?' active':''}" data-cat="${k}">${l}</button>`).join("");
    $("chips").querySelectorAll(".chip").forEach(b=>{
      b.onclick = ()=>{ activeCat=b.dataset.cat;
        $("chips").querySelectorAll(".chip").forEach(x=>x.classList.remove("active"));
        b.classList.add("active"); render(); };
    });
    observeReveal();
  }

  function setGroup(el, label){ el.textContent = label; el.href = CONFIG.whatsappGroup; }

  function render(){
    const t = T[LANG];
    const q = $("search").value.trim().toLowerCase();
    let list = ITEMS.filter(i=>{
      const matchCat = activeCat==="all" || i.cat===activeCat;
      const hay = (i.name[LANG]+" "+i.desc[LANG]+" "+CATS[i.cat][LANG]).toLowerCase();
      return matchCat && (!q || hay.includes(q));
    });
    $("count-sub").textContent = t.countSub(list.length);
    const grid = $("grid"); grid.innerHTML = "";
    if(!list.length){ grid.innerHTML = `<div class="empty">${t.empty}</div>`; return; }
    list.forEach(i=>{
      const card = document.createElement("article");
      card.className = "card reveal";
      card.innerHTML = `
        <div class="thumb" data-img="${i.img}" data-name="${i.name[LANG]}">
          <span class="cat-tag">${CATS[i.cat][LANG]}</span>
          <img src="${i.img}" alt="${i.name[LANG]}" loading="lazy">
          <span class="zoom-hint">${t.zoom}</span>
        </div>
        <div class="body">
          <h3>${i.name[LANG]}</h3>
          <p class="desc">${i.desc[LANG]}</p>
          <div class="foot">
            <span class="condition">${COND[i.cond][LANG]}</span>
            <a class="bid" href="${CONFIG.whatsappGroup}" target="_blank" rel="noopener">${t.bid}</a>
          </div>
        </div>`;
      card.querySelector(".thumb").addEventListener("click", e=>{
        const el = e.currentTarget; openLightbox(el.dataset.img, el.dataset.name);
      });
      grid.appendChild(card);
    });
    observeReveal();
  }

  // Lightbox
  const lb = $("lightbox"), lbImg = $("lb-img"), lbCap = $("lb-caption");
  function openLightbox(src, cap){ lbImg.src=src; lbCap.textContent=cap||""; lb.classList.add("open"); }
  function closeLightbox(){ lb.classList.remove("open"); lbImg.src=""; }
  $("lb-close").onclick = closeLightbox;
  lb.addEventListener("click", e=>{ if(e.target===lb) closeLightbox(); });
  document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeLightbox(); });

  // ظهور تدريجي
  let io;
  function observeReveal(){
    if(!io) io = new IntersectionObserver(entries=>{
      entries.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add("in"); io.unobserve(en.target); } });
    }, { threshold:.12 });
    document.querySelectorAll(".reveal:not(.in)").forEach(el=>io.observe(el));
  }

  // أحداث
  $("search").addEventListener("input", render);
  document.querySelectorAll(".lang-toggle button").forEach(b=>{
    b.onclick = ()=>{ LANG=b.dataset.lang;
      document.querySelectorAll(".lang-toggle button").forEach(x=>x.classList.remove("active"));
      b.classList.add("active"); applyStaticText(); render(); };
  });

  applyStaticText();
  render();
  </script>
